[[permission]]
identifier = "allow-main-commands"
description = "Allows the trusted Bridge Agent main webview to invoke desktop commands."
commands.allow = [
  "load_config",
  "save_config",
  "save_service",
  "delete_service",
  "start_agent",
  "stop_agent",
  "stop_conflicting_runtime",
  "runtime_snapshot",
  "apply_saved_config_to_runtime",
  "test_capability",
  "list_logs",
  "clear_logs",
  "reset_example_config",
  "recover_invalid_config",
  "open_in_browser",
  "open_in_edge",
  "desktop_permission_status",
  "registered_service_statuses",
  "start_registered_service",
  "stop_registered_service",
  "list_connector_apps",
  "connector_app_ui_url",
  "list_market_connector_apps",
  "show_connector_app",
  "invoke_connector_management",
  "check_connector_app_update",
  "install_connector_app",
  "start_connector_app",
  "stop_connector_app",
  "uninstall_connector_app",
  "request_desktop_permission",
  "open_desktop_permission_settings",
  "start_browser_auth",
  "poll_browser_auth",
  "app_version",
  "check_app_update",
  "install_app_update",
  "baijimu_cli_status",
  "install_baijimu_cli_update",
  "rollback_baijimu_cli"
]
