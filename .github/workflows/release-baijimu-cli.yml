name: release-baijimu-cli

on:
  push:
    tags:
      - "baijimu-cli-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag, for example baijimu-cli-v0.1.1
        required: true
        type: string
      cli_ref:
        description: baijimu-cli-rs tag or branch, for example v0.1.1
        required: true
        type: string
      cli_commit:
        description: Exact baijimu-cli-rs commit to build
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: baijimu-cli-release
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            baijimu-cli-v*) ;;
            *)
              echo "Invalid Baijimu CLI release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Baijimu CLI ${RELEASE_TAG#baijimu-cli-v}"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --draft \
              --title "Baijimu CLI ${RELEASE_TAG#baijimu-cli-v}" \
              --notes "Baijimu CLI official managed-tool release."
          fi

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            runner: macos-15-intel
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: windows-x64
            runner: windows-latest
            rust_targets: ""
          - name: linux-x64
            runner: ubuntu-22.04
            rust_targets: ""
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      CLI_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || github.ref_name }}
      CLI_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_commit || '' }}
      MACOSX_DEPLOYMENT_TARGET: "10.13"
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4

      - name: Resolve CLI ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "CLI_REF=${RELEASE_TAG#baijimu-cli-}" >> "$GITHUB_ENV"
          fi

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          if [ -n "${{ matrix.rust_targets }}" ]; then
            rustup target add ${{ matrix.rust_targets }}
          fi
          rustc --version
          cargo --version

      - name: Checkout Baijimu CLI source
        shell: bash
        env:
          BAIJIMU_CLI_RS_GIT_TOKEN: ${{ secrets.BAIJIMU_CLI_RS_GIT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$BAIJIMU_CLI_RS_GIT_TOKEN" ]; then
            echo "Missing BAIJIMU_CLI_RS_GIT_TOKEN" >&2
            exit 1
          fi
          git clone --depth 1 --branch "$CLI_REF" \
            "https://oauth2:${BAIJIMU_CLI_RS_GIT_TOKEN}@gitee.com/zxflimit_admin/baijimu-cli-rs.git" \
            "$RUNNER_TEMP/baijimu-cli-rs"
          if [ -n "$CLI_COMMIT" ] && [ "$(git -C "$RUNNER_TEMP/baijimu-cli-rs" rev-parse HEAD)" != "$CLI_COMMIT" ]; then
            echo "CLI ref $CLI_REF does not point to expected commit $CLI_COMMIT" >&2
            exit 1
          fi
          cli_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' "$RUNNER_TEMP/baijimu-cli-rs/Cargo.toml" | head -1)"
          if [ "baijimu-cli-v${cli_version}" != "$RELEASE_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match CLI version $cli_version" >&2
            exit 1
          fi
          echo "CLI_VERSION=$cli_version" >> "$GITHUB_ENV"

      - name: Reuse existing immutable release asset
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="baijimu-cli-${CLI_VERSION}-${{ matrix.name }}.zip"
          assets="$RUNNER_TEMP/existing-baijimu-cli-release-asset"
          mkdir -p "$assets"
          if gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$assets" \
            --pattern "$asset" \
            --pattern "$asset.sha256" &&
             (
               cd "$assets"
               sha256sum --check "$asset.sha256"
             ); then
            echo "REUSE_CLI_RELEASE_ASSET=true" >> "$GITHUB_ENV"
            echo "Reusing verified immutable GitHub Release asset $asset"
          else
            echo "REUSE_CLI_RELEASE_ASSET=false" >> "$GITHUB_ENV"
            echo "No complete verified GitHub Release asset found for $asset; rebuilding"
          fi

      - name: Build macOS universal CLI
        if: runner.os == 'macOS' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cli_dir="$RUNNER_TEMP/baijimu-cli-rs"
          cargo build --release --target x86_64-apple-darwin --manifest-path "$cli_dir/Cargo.toml"
          MACOSX_DEPLOYMENT_TARGET=11.0 cargo build --release --target aarch64-apple-darwin --manifest-path "$cli_dir/Cargo.toml"
          mkdir -p "$RUNNER_TEMP/baijimu-cli-package/bin"
          lipo -create \
            "$cli_dir/target/x86_64-apple-darwin/release/baijimu" \
            "$cli_dir/target/aarch64-apple-darwin/release/baijimu" \
            -output "$RUNNER_TEMP/baijimu-cli-package/bin/baijimu"
          chmod 755 "$RUNNER_TEMP/baijimu-cli-package/bin/baijimu"

      - name: Sign macOS CLI
        if: runner.os == 'macOS' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Xiaofeng Zhang (H82D8SYZ94)"
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done
          certificate_path="$RUNNER_TEMP/baijimu-cli-certificate.p12"
          keychain_path="$RUNNER_TEMP/baijimu-cli-signing.keychain-db"
          keychain_password="$(uuidgen)"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$RUNNER_TEMP/baijimu-cli-package/bin/baijimu"
          codesign --verify --strict --verbose=2 "$RUNNER_TEMP/baijimu-cli-package/bin/baijimu"

      - name: Build Windows CLI
        if: runner.os == 'Windows' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cliDir = Join-Path $env:RUNNER_TEMP "baijimu-cli-rs"
          cargo build --release --manifest-path (Join-Path $cliDir "Cargo.toml")
          $packageBin = Join-Path $env:RUNNER_TEMP "baijimu-cli-package\bin"
          New-Item -ItemType Directory -Force -Path $packageBin | Out-Null
          Copy-Item -Force (Join-Path $cliDir "target\release\baijimu.exe") (Join-Path $packageBin "baijimu.exe")

      - name: Prepare Windows signing tools
        if: runner.os == 'Windows' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("SSL_COM_USERNAME", "SSL_COM_PASSWORD", "SSL_COM_CREDENTIAL_ID", "SSL_COM_TOTP_SECRET")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required Windows signing secret: $name"
            }
          }
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "CodeSignTool"
          Invoke-WebRequest -Uri "https://ssl.com/wp-content/uploads/2024/10/CodeSignTool-v1.3.1-windows.zip" -OutFile $zipPath
          $expectedSha256 = "e45a9e6c2aac4cae16c114eb590a2196406681357eb587507c65cd3646b5330d"
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) { throw "CodeSignTool archive checksum mismatch: $actualSha256" }
          Expand-Archive -Force -Path $zipPath -DestinationPath $extractPath
          $codeSignTool = Get-ChildItem -Path $extractPath -Filter "CodeSignTool.bat" -Recurse -File | Select-Object -First 1
          if (-not $codeSignTool) { throw "Unable to locate CodeSignTool.bat" }
          "CODESIGN_TOOL_PATH=$($codeSignTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WINDOWS_SIGNING_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign Windows CLI
        if: runner.os == 'Windows' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          WINDOWS_SIGNING_ENABLED: "true"
          WINDOWS_SIGNING_DESCRIPTION: "Baijimu CLI"
        run: |
          $ErrorActionPreference = "Stop"
          & "src-tauri/scripts/sign-windows-artifact.ps1" -FilePath (Join-Path $env:RUNNER_TEMP "baijimu-cli-package\bin\baijimu.exe")
          $signature = Get-AuthenticodeSignature -LiteralPath (Join-Path $env:RUNNER_TEMP "baijimu-cli-package\bin\baijimu.exe")
          if ($signature.Status -ne "Valid") { throw "CLI signature status is $($signature.Status)" }

      - name: Build Linux CLI
        if: runner.os == 'Linux' && env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cli_dir="$RUNNER_TEMP/baijimu-cli-rs"
          cargo build --release --manifest-path "$cli_dir/Cargo.toml"
          mkdir -p "$RUNNER_TEMP/baijimu-cli-package/bin"
          install -m 755 "$cli_dir/target/release/baijimu" "$RUNNER_TEMP/baijimu-cli-package/bin/baijimu"

      - name: Verify and package CLI
        if: env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: bash
        run: |
          set -euo pipefail
          binary_name="baijimu"
          if [ "$RUNNER_OS" = "Windows" ]; then
            binary_name="baijimu.exe"
          fi
          binary="$RUNNER_TEMP/baijimu-cli-package/bin/$binary_name"
          "$binary" --version --json
          output="$RUNNER_TEMP/baijimu-cli-${CLI_VERSION}-${{ matrix.name }}.zip"
          cd "$RUNNER_TEMP/baijimu-cli-package"
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -NoProfile -Command "Compress-Archive -Force -Path 'bin' -DestinationPath '$output'"
            checksum="$(powershell -NoProfile -Command "(Get-FileHash -Algorithm SHA256 -LiteralPath '$output').Hash.ToLowerInvariant()")"
          else
            zip -r "$output" bin
            checksum="$(shasum -a 256 "$output" | awk '{print $1}')"
          fi
          printf '%s  %s\n' "$checksum" "$(basename "$output")" > "$output.sha256"
          echo "RELEASE_ASSET=$output" >> "$GITHUB_ENV"

      - name: Upload CLI release assets
        if: env.REUSE_CLI_RELEASE_ASSET != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" "$RELEASE_ASSET.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  publish-release:
    needs: build
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest=false

  mirror-domestic-release:
    name: Mirror CLI release assets to Gitee
    needs: publish-release
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Download and verify GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#baijimu-cli-v}"
          assets="$RUNNER_TEMP/baijimu-cli-release-assets"
          mkdir -p "$assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$assets" \
            --pattern "baijimu-cli-${version}-*.zip" \
            --pattern "baijimu-cli-${version}-*.zip.sha256"
          test "$(find "$assets" -maxdepth 1 -type f -name '*.zip' | wc -l | tr -d ' ')" = 3
          test "$(find "$assets" -maxdepth 1 -type f -name '*.zip.sha256' | wc -l | tr -d ' ')" = 3
          (
            cd "$assets"
            sha256sum --check ./*.sha256
          )
          echo "CLI_VERSION=$version" >> "$GITHUB_ENV"
          echo "CLI_ASSETS_DIRECTORY=$assets" >> "$GITHUB_ENV"

      - name: Mirror immutable CLI release tag to Gitee
        shell: bash
        env:
          GITEE_USER: zxflimit_admin
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GITEE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: GITEE_ACCESS_TOKEN" >&2
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            git fetch origin \
              "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          fi
          release_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          tools/release/publish-gitee-tag.sh "$RELEASE_TAG" "$release_commit"
          echo "RELEASE_COMMIT=$release_commit" >> "$GITHUB_ENV"

      - name: Mirror and verify domestic release
        shell: bash
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GITEE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: GITEE_ACCESS_TOKEN" >&2
            exit 1
          fi
          node .github/scripts/mirror-cli-release-to-gitee.mjs \
            "$RELEASE_TAG" \
            "$CLI_VERSION" \
            "$RELEASE_COMMIT" \
            "$CLI_ASSETS_DIRECTORY"

  publish-npm:
    needs: mirror-domestic-release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      CLI_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || github.ref_name }}
      CLI_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_commit || '' }}
    steps:
      - name: Resolve CLI ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "CLI_REF=${RELEASE_TAG#baijimu-cli-}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Checkout Baijimu CLI source
        shell: bash
        env:
          BAIJIMU_CLI_RS_GIT_TOKEN: ${{ secrets.BAIJIMU_CLI_RS_GIT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$BAIJIMU_CLI_RS_GIT_TOKEN" ]; then
            echo "Missing BAIJIMU_CLI_RS_GIT_TOKEN" >&2
            exit 1
          fi
          git clone --depth 1 --branch "$CLI_REF" \
            "https://oauth2:${BAIJIMU_CLI_RS_GIT_TOKEN}@gitee.com/zxflimit_admin/baijimu-cli-rs.git" \
            "$RUNNER_TEMP/baijimu-cli-rs"
          if [ -n "$CLI_COMMIT" ] && [ "$(git -C "$RUNNER_TEMP/baijimu-cli-rs" rev-parse HEAD)" != "$CLI_COMMIT" ]; then
            echo "CLI ref $CLI_REF does not point to expected commit $CLI_COMMIT" >&2
            exit 1
          fi
          cli_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' "$RUNNER_TEMP/baijimu-cli-rs/Cargo.toml" | head -1)"
          if [ "baijimu-cli-v${cli_version}" != "$RELEASE_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match CLI version $cli_version" >&2
            exit 1
          fi
          npm_native_version="$(node -p 'require(process.argv[1]).baijimu.nativeVersion' "$RUNNER_TEMP/baijimu-cli-rs/npm/package.json")"
          if [ "$npm_native_version" != "$cli_version" ]; then
            echo "npm nativeVersion $npm_native_version does not match CLI version $cli_version" >&2
            exit 1
          fi
          npm_package_version="$(node -p 'require(process.argv[1]).version' "$RUNNER_TEMP/baijimu-cli-rs/npm/package.json")"
          if [ "$npm_package_version" != "$cli_version" ]; then
            echo "npm package version $npm_package_version does not match CLI version $cli_version" >&2
            exit 1
          fi
          echo "CLI_VERSION=$cli_version" >> "$GITHUB_ENV"

      - name: Download and verify signed native assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets="$RUNNER_TEMP/baijimu-cli-release-assets"
          mkdir -p "$assets"
          for platform in macos-universal windows-x64 linux-x64; do
            asset="baijimu-cli-${CLI_VERSION}-${platform}.zip"
            gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$assets" \
              --pattern "$asset" \
              --pattern "$asset.sha256"
          done
          cd "$assets"
          sha256sum --check ./*.sha256

      - name: Assemble native npm launcher
        shell: bash
        run: |
          set -euo pipefail
          cli_dir="$RUNNER_TEMP/baijimu-cli-rs"
          assets="$RUNNER_TEMP/baijimu-cli-release-assets"
          native="$cli_dir/npm/native"
          mkdir -p \
            "$native/darwin-arm64" \
            "$native/darwin-x64" \
            "$native/win32-x64" \
            "$native/linux-x64"

          mac="baijimu-cli-${CLI_VERSION}-macos-universal.zip"
          win="baijimu-cli-${CLI_VERSION}-windows-x64.zip"
          linux="baijimu-cli-${CLI_VERSION}-linux-x64.zip"
          unzip -p "$assets/$mac" bin/baijimu > "$native/darwin-arm64/baijimu"
          cp "$native/darwin-arm64/baijimu" "$native/darwin-x64/baijimu"

          windows_unzip_status=0
          unzip -q "$assets/$win" -d "$assets/windows-unpacked" || windows_unzip_status=$?
          test "$windows_unzip_status" -le 1
          cp "$assets/windows-unpacked/bin/baijimu.exe" "$native/win32-x64/baijimu.exe"

          unzip -p "$assets/$linux" bin/baijimu > "$native/linux-x64/baijimu"
          chmod 755 \
            "$native/darwin-arm64/baijimu" \
            "$native/darwin-x64/baijimu" \
            "$native/linux-x64/baijimu"
          test -s "$native/win32-x64/baijimu.exe"
          test "$("$native/linux-x64/baijimu" --version)" = "$CLI_VERSION"
          "$native/linux-x64/baijimu" --version --json

      - name: Test and publish npm launcher with OIDC
        shell: bash
        working-directory: ${{ runner.temp }}/baijimu-cli-rs/npm
        run: |
          set -euo pipefail
          npm install --global npm@latest
          npm --version
          npm ci
          npm test
          npm run pack:check
          npm publish --access public --registry https://registry.npmjs.org/
