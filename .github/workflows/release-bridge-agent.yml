name: release-bridge-agent

on:
  push:
    tags:
      - "bridge-agent-v*"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal
            runner: macos-15-intel
            tauri_args: --target universal-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            tauri_args: --bundles msi
            rust_targets: ""
          - name: Linux x64
            runner: ubuntu-22.04
            tauri_args: --bundles appimage,deb
            rust_targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bridge Agent ${{ github.ref_name }}
          releaseBody: |
            Bridge Agent desktop release.

            Download the installer for your platform from the Assets section below:
            - macOS: universal `.dmg` (works on both Intel and Apple Silicon)
            - Windows: `.msi` or installer executable
            - Linux: `.AppImage` / `.deb` / archive

            This release is built automatically by GitHub Actions from the tagged source.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: ${{ matrix.tauri_args }}
