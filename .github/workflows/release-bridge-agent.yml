name: release-bridge-agent

on:
  push:
    tags:
      - "bridge-agent-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example bridge-agent-v0.1.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-domestic-release:
    name: Prepare domestic release
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Upsert domestic release
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          case "$api" in
            *://relay.baijimu.com/*)
              echo "BRIDGE_AGENT_RELEASE_API_URL must use updates.baijimu.com for new releases; relay.baijimu.com is legacy compatibility only." >&2
              exit 1
              ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\",\"releaseName\":\"百积木 $RELEASE_TAG\",\"source\":\"github-actions\"}" \
            "$api/releases/$RELEASE_TAG"

  release:
    name: ${{ matrix.name }}
    needs: prepare-domestic-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal
            runner: macos-15-intel
            tauri_args: --target universal-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            tauri_args: --bundles msi
            rust_targets: ""
          - name: Linux x64
            runner: ubuntu-22.04
            tauri_args: --bundles appimage,deb
            rust_targets: ""
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      MACOSX_DEPLOYMENT_TARGET: "10.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled Baijimu CLI
        shell: bash
        env:
          BAIJIMU_CLI_RS_GIT_URL: https://gitee.com/zxflimit_admin/baijimu-cli-rs.git
          BAIJIMU_CLI_RS_GIT_TOKEN: ${{ secrets.BAIJIMU_CLI_RS_GIT_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "macOS" ]; then
            export BAIJIMU_CLI_RS_MACOS_UNIVERSAL=true
          fi
          ./tools/baijimu-cli/prepare-bundled-cli.sh

      - name: Configure Windows signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "SSL_COM_USERNAME",
            "SSL_COM_PASSWORD",
            "SSL_COM_CREDENTIAL_ID",
            "SSL_COM_TOTP_SECRET"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Windows release requires code signing. Missing SSL.com secrets: $($missing -join ', ')"
          }
          "WINDOWS_SIGNING_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare Windows signing tools
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "CodeSignTool"

          Invoke-WebRequest `
            -Uri "https://ssl.com/wp-content/uploads/2024/10/CodeSignTool-v1.3.1-windows.zip" `
            -OutFile $zipPath
          $expectedSha256 = "e45a9e6c2aac4cae16c114eb590a2196406681357eb587507c65cd3646b5330d"
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "CodeSignTool archive checksum mismatch: $actualSha256"
          }
          Expand-Archive -Force -Path $zipPath -DestinationPath $extractPath

          $codeSignTool = Get-ChildItem `
            -Path $extractPath `
            -Filter "CodeSignTool.bat" `
            -Recurse `
            -File |
            Select-Object -First 1

          if (-not $codeSignTool) {
            throw "Unable to locate CodeSignTool.bat"
          }
          "CODESIGN_TOOL_PATH=$($codeSignTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Push-Location $codeSignTool.DirectoryName
          try {
            & ".\CodeSignTool.bat" --version
          } finally {
            Pop-Location
          }

      - name: Prepare Apple notarization credentials
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" >> "$GITHUB_ENV"

      - name: Sign bundled Baijimu CLI
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Xiaofeng Zhang (H82D8SYZ94)"
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          cli_path="src-tauri/resources/bin/baijimu"
          if [ ! -x "$cli_path" ]; then
            echo "Bundled Baijimu CLI is missing or not executable: $cli_path" >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/baijimu-cli-signing-certificate.p12"
          keychain_path="$RUNNER_TEMP/baijimu-cli-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$cli_path"
          codesign --verify --strict --verbose=2 "$cli_path"
          lipo -info "$cli_path"

      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Validate release service config
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_UPDATE_API_URL BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done
          case "$BRIDGE_AGENT_UPDATE_API_URL" in
            *://relay.baijimu.com/*)
              echo "BRIDGE_AGENT_UPDATE_API_URL must use updates.baijimu.com for new releases; relay.baijimu.com is legacy compatibility only." >&2
              exit 1
              ;;
          esac
          case "$BRIDGE_AGENT_RELEASE_API_URL" in
            *://relay.baijimu.com/*)
              echo "BRIDGE_AGENT_RELEASE_API_URL must use updates.baijimu.com for new releases; relay.baijimu.com is legacy compatibility only." >&2
              exit 1
              ;;
          esac

      - name: Build release bundles
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_PAGE_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_PAGE_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Xiaofeng Zhang (H82D8SYZ94)"
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          WINDOWS_SIGNING_ENABLED: ${{ env.WINDOWS_SIGNING_ENABLED }}
          WINDOWS_SIGNING_DESCRIPTION: "百积木"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required updater signing secret: $name" >&2
              exit 1
            fi
          done
          npm run tauri -- build ${{ matrix.tauri_args }}

      - name: Diagnose Windows WiX fragment failure
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $candle = Get-ChildItem `
            -Path "src-tauri/target/release/wix" `
            -Filter "candle.exe" `
            -File `
            -Recurse `
            -ErrorAction Stop | Select-Object -First 1
          $utilExtension = Get-ChildItem `
            -Path $candle.Directory.FullName `
            -Filter "WixUtilExtension.dll" `
            -File `
            -ErrorAction Stop | Select-Object -First 1
          if (-not $candle -or -not $utilExtension) {
            throw "WiX compiler or WixUtilExtension was not found after bundle failure"
          }
          & $candle.FullName `
            -nologo `
            -arch x64 `
            -ext $utilExtension.FullName `
            "src-tauri/wix/bridge-agent-service.wxs"
          if ($LASTEXITCODE -ne 0) {
            throw "Windows WiX fragment diagnostic failed with exit code $LASTEXITCODE"
          }

      - name: Verify macOS minimum system version
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          intel_configured_min="10.13"
          apple_silicon_configured_min="11.0"
          dmg_dir="src-tauri/target/universal-apple-darwin/release/bundle/dmg"

          shopt -s nullglob
          dmg_files=("$dmg_dir"/*.dmg)
          if [ "${#dmg_files[@]}" -ne 1 ]; then
            echo "Expected one macOS DMG, found ${#dmg_files[@]}:" >&2
            printf ' - %s\n' "${dmg_files[@]}" >&2
            exit 1
          fi

          mount_dir="$(mktemp -d)"
          hdiutil attach "${dmg_files[0]}" -readonly -nobrowse -mountpoint "$mount_dir"
          cleanup_mount() {
            hdiutil detach "$mount_dir" >/dev/null 2>&1 || true
            rm -rf "$mount_dir"
          }
          trap cleanup_mount EXIT

          app_path="$mount_dir/百积木.app"
          if [ ! -d "$app_path" ]; then
            app_path="$(find "$mount_dir" -maxdepth 2 -name '*.app' -type d | head -n 1)"
          fi
          if [ -z "$app_path" ] || [ ! -d "$app_path" ]; then
            echo "Unable to locate app bundle inside ${dmg_files[0]}" >&2
            exit 1
          fi
          info_plist="${app_path}/Contents/Info.plist"

          version_lte() {
            python3 - "$1" "$2" <<'PY'
          import sys
          def parts(value):
              return tuple(int(part) for part in value.split(".")[:3])
          left = parts(sys.argv[1])
          right = parts(sys.argv[2])
          size = max(len(left), len(right))
          left += (0,) * (size - len(left))
          right += (0,) * (size - len(right))
          sys.exit(0 if left <= right else 1)
          PY
          }

          verify_macho_min() {
            local binary="$1"
            local label="$2"
            if [ ! -x "$binary" ]; then
              echo "${label} is missing or not executable: ${binary}" >&2
              exit 1
            fi
            for arch in $(lipo -archs "$binary"); do
              local configured_min="$intel_configured_min"
              if [ "$arch" = "arm64" ]; then
                configured_min="$apple_silicon_configured_min"
              fi
              local min_version
              min_version="$(
                otool -arch "$arch" -l "$binary" | awk '
                  /LC_BUILD_VERSION/ { in_build = 1; in_min = 0; next }
                  in_build && /minos/ { print $2; exit }
                  /LC_VERSION_MIN_MACOSX/ { in_min = 1; in_build = 0; next }
                  in_min && /version/ { print $2; exit }
                '
              )"
              if [ -z "$min_version" ]; then
                echo "Unable to read ${label} ${arch} minimum macOS version" >&2
                exit 1
              fi
              if ! version_lte "$min_version" "$configured_min"; then
                echo "${label} ${arch} requires macOS ${min_version}, expected <= ${configured_min}" >&2
                exit 1
              fi
            done
          }

          if plist_min="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$info_plist" 2>/dev/null)"; then
            if ! version_lte "$plist_min" "$apple_silicon_configured_min"; then
              echo "LSMinimumSystemVersion=${plist_min}, expected <= ${apple_silicon_configured_min}" >&2
              exit 1
            fi
          else
            echo "LSMinimumSystemVersion not present; relying on Mach-O deployment target checks."
          fi

          verify_macho_min "${app_path}/Contents/MacOS/bridge-agent-desktop" "bridge-agent-desktop"
          verify_macho_min "${app_path}/Contents/Resources/resources/bin/baijimu" "bundled baijimu CLI"

      - name: Normalize public bundle names
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#bridge-agent-v}"

          normalize_one() {
            local label="$1"
            local expected_path="$2"
            shift 2
            local bundle_files=("$@")
            if [ "${#bundle_files[@]}" -eq 0 ]; then
              echo "No $label bundle found" >&2
              exit 1
            fi
            if [ "${#bundle_files[@]}" -gt 1 ]; then
              echo "Expected one $label bundle, found ${#bundle_files[@]}:" >&2
              printf ' - %s\n' "${bundle_files[@]}" >&2
              exit 1
            fi
            if [ "${bundle_files[0]}" != "$expected_path" ]; then
              source_signature="${bundle_files[0]}.sig"
              mv "${bundle_files[0]}" "$expected_path"
              if [ -f "$source_signature" ]; then
                mv "$source_signature" "${expected_path}.sig"
              fi
            fi
            test -f "$expected_path"
          }

          shopt -s nullglob
          case "${{ runner.os }}" in
            macOS)
              bundle_dir="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
              normalize_one "macOS dmg" \
                "$bundle_dir/Baijimu_${version}_universal.dmg" \
                "$bundle_dir"/*.dmg
              updater_dir="src-tauri/target/universal-apple-darwin/release/bundle/macos"
              normalize_one "macOS updater" \
                "$updater_dir/Baijimu_${version}_universal.app.tar.gz" \
                "$updater_dir"/*.app.tar.gz
              test -s "$updater_dir/Baijimu_${version}_universal.app.tar.gz.sig"
              ;;
            Windows)
              bundle_dir="src-tauri/target/release/bundle/msi"
              normalize_one "Windows msi" \
                "$bundle_dir/Baijimu_${version}_x64_en-US.msi" \
                "$bundle_dir"/*.msi
              test -s "$bundle_dir/Baijimu_${version}_x64_en-US.msi.sig"
              ;;
            Linux)
              appimage_dir="src-tauri/target/release/bundle/appimage"
              deb_dir="src-tauri/target/release/bundle/deb"
              normalize_one "Linux AppImage" \
                "$appimage_dir/Baijimu_${version}_amd64.AppImage" \
                "$appimage_dir"/*.AppImage
              test -s "$appimage_dir/Baijimu_${version}_amd64.AppImage.sig"
              normalize_one "Linux deb" \
                "$deb_dir/Baijimu_${version}_amd64.deb" \
                "$deb_dir"/*.deb
              ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}" >&2
              exit 1
              ;;
          esac

      - name: Verify Windows MSI service contract
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $serviceExecutable = Resolve-Path "src-tauri/target/release/bridge-agent-service.exe"
          $serviceSignature = Get-AuthenticodeSignature -LiteralPath $serviceExecutable.Path
          Write-Host "$($serviceExecutable.Path): $($serviceSignature.Status)"
          if ($serviceSignature.Status -ne "Valid") {
            throw "Invalid bridge-agent-service.exe signature: $($serviceSignature.Status)"
          }

          $msiFiles = Get-ChildItem `
            -Path "src-tauri/target/release/bundle/msi" `
            -Filter "*.msi" `
            -File `
            -ErrorAction Stop
          if ($msiFiles.Count -ne 1) {
            throw "Expected one Windows MSI artifact, found $($msiFiles.Count)"
          }
          & "src-tauri/scripts/verify-windows-msi.ps1" -FilePath $msiFiles[0].FullName

      - name: Verify Windows signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diagnosticFiles = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          foreach ($file in $diagnosticFiles) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status) (intermediate exe)"
          }

          $files = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction Stop

          if ($files.Count -eq 0) {
            throw "No Windows MSI artifacts found to verify"
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($file.FullName): $($signature.Status)"
            }
          }

      - name: Verify Windows executables are self-contained
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe was not found"
          }
          $visualStudioRoot = & $vswhere -latest -products * -property installationPath
          $dumpbin = Get-ChildItem `
            -Path "$visualStudioRoot\VC\Tools\MSVC" `
            -Filter "dumpbin.exe" `
            -File `
            -Recurse `
            -ErrorAction Stop | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $dumpbin) {
            throw "dumpbin.exe was not found"
          }

          $executables = @(
            (Resolve-Path "src-tauri/target/release/bridge-agent-service.exe").Path,
            (Resolve-Path "src-tauri/target/release/bridge-agent-desktop.exe").Path
          )
          foreach ($executable in $executables) {
            $imports = (& $dumpbin.FullName /DEPENDENTS $executable 2>&1) -join "`n"
            Write-Host $imports
            if ($imports -match '(?i)\b(?:VCRUNTIME|MSVCP)\d*(?:_\d+)?\.dll\b') {
              throw "Windows executable requires the Visual C++ runtime: $executable"
            }
          }
          Write-Host "Verified Windows executables do not require VCRUNTIME/MSVCP"

      - name: Smoke test Windows MSI install lifecycle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = Get-ChildItem `
            -Path "src-tauri/target/release/bundle/msi" `
            -Filter "*.msi" `
            -File `
            -ErrorAction Stop | Select-Object -First 1
          if (-not $msi) {
            throw "Windows MSI artifact was not found for install smoke test"
          }

          $installLog = Join-Path $env:RUNNER_TEMP "baijimu-msi-install.log"
          $uninstallLog = Join-Path $env:RUNNER_TEMP "baijimu-msi-uninstall.log"
          $installSucceeded = $false
          try {
            $install = Start-Process `
              -FilePath "msiexec.exe" `
              -ArgumentList @("/i", "`"$($msi.FullName)`"", "/qn", "/norestart", "/L*v", "`"$installLog`"") `
              -Wait `
              -PassThru
            if ($install.ExitCode -notin @(0, 3010)) {
              if (Test-Path -LiteralPath $installLog) {
                Get-Content -LiteralPath $installLog -Tail 180 | Write-Host
              }
              throw "Windows MSI install smoke test failed with exit code $($install.ExitCode)"
            }
            $installSucceeded = $true

            $deadline = (Get-Date).AddSeconds(15)
            do {
              $service = Get-CimInstance Win32_Service -Filter "Name='BridgeAgent'" -ErrorAction SilentlyContinue
              if ($service -and $service.State -eq "Running") {
                break
              }
              Start-Sleep -Milliseconds 500
            } while ((Get-Date) -lt $deadline)

            if (-not $service) {
              throw "BridgeAgent service was not installed"
            }
            if ($service.State -ne "Running") {
              throw "BridgeAgent service is not running: $($service.State)"
            }
            if ($service.StartMode -ne "Auto") {
              throw "BridgeAgent service is not automatic: $($service.StartMode)"
            }
            if ($service.StartName -ne "LocalSystem") {
              throw "BridgeAgent service account is not LocalSystem: $($service.StartName)"
            }
            if ($service.PathName -notlike "*ProgramData*Baijimu*BridgeAgent*agent-config.json*") {
              throw "BridgeAgent service does not use the shared config path: $($service.PathName)"
            }

            $configPath = "C:\ProgramData\Baijimu\BridgeAgent\agent-config.json"
            if (-not (Test-Path -LiteralPath $configPath)) {
              throw "BridgeAgent service did not initialize the shared config"
            }
            Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json | Out-Null

            $runValue = Get-ItemPropertyValue `
              -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Run" `
              -Name "BaijimuBridgeAgent" `
              -ErrorAction Stop
            if ($runValue -notlike "*bridge-agent-desktop.exe*") {
              throw "Baijimu desktop logon startup entry is invalid: $runValue"
            }

            Write-Host "Verified Windows MSI install lifecycle: service running with shared config"
          } finally {
            if ($installSucceeded) {
              $uninstall = Start-Process `
                -FilePath "msiexec.exe" `
                -ArgumentList @("/x", "`"$($msi.FullName)`"", "/qn", "/norestart", "/L*v", "`"$uninstallLog`"") `
                -Wait `
                -PassThru
              if ($uninstall.ExitCode -notin @(0, 1605, 3010)) {
                if (Test-Path -LiteralPath $uninstallLog) {
                  Get-Content -LiteralPath $uninstallLog -Tail 120 | Write-Host
                }
                throw "Windows MSI uninstall smoke test failed with exit code $($uninstall.ExitCode)"
              }
            }
          }

          if (Get-Service -Name "BridgeAgent" -ErrorAction SilentlyContinue) {
            throw "BridgeAgent service remained after MSI uninstall"
          }
          if (Test-Path -LiteralPath "C:\Program Files\Baijimu\bridge-agent-service.exe") {
            throw "BridgeAgent service executable remained after MSI uninstall"
          }
          Write-Host "Verified Windows MSI uninstall lifecycle"

      - name: Upload bundles to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          retry_gh() {
            local attempt delay
            for attempt in $(seq 1 20); do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 20 ]; then
                echo "GitHub CLI command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              delay=$((attempt * 5))
              if [ "$delay" -gt 60 ]; then
                delay=60
              fi
              echo "GitHub CLI command failed; retrying in ${delay} seconds (${attempt}/20): $*" >&2
              sleep "$delay"
            done
          }

          release_notes="$(mktemp)"
          cat > "$release_notes" <<'NOTES'
          百积木桌面端发布。

          Download the installer for your platform from the Assets section below:
          - macOS: universal `.dmg` (works on both Intel and Apple Silicon)
          - Windows: `.msi` installer that downloads WebView2 only when it is missing
          - Linux: `.AppImage` / `.deb` / archive

          This release is built automatically by GitHub Actions from the tagged source.
          NOTES

          prerelease_flag=()
          case "$RELEASE_TAG" in
            *-alpha*|*-beta*|*-rc*) prerelease_flag=(--prerelease) ;;
          esac

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            retry_gh gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "百积木 $RELEASE_TAG" \
              --notes-file "$release_notes" \
              "${prerelease_flag[@]}" \
              || retry_gh gh release view "$RELEASE_TAG" >/dev/null
          fi

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(
                src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
                src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
                src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
              )
              ;;
            "Windows x64")
              bundle_files=(
                src-tauri/target/release/bundle/msi/*.msi
                src-tauri/target/release/bundle/msi/*.msi.sig
              )
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/appimage/*.AppImage.sig
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          if [ "${#bundle_files[@]}" -eq 0 ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          for asset in "${bundle_files[@]}"; do
            retry_gh gh release upload "$RELEASE_TAG" "$asset" --clobber
          done

      - name: Upload release bundles to domestic release service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(
                src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
                src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              )
              ;;
            "Windows x64")
              bundle_files=(src-tauri/target/release/bundle/msi/*.msi)
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          if [ "${#bundle_files[@]}" -eq 0 ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          for asset in "${bundle_files[@]}"; do
            if [ -s "${asset}.sig" ]; then
              node .github/scripts/upload-release-asset.mjs \
                "$api" \
                "$RELEASE_TAG" \
                "$version" \
                "$RELEASE_TARGET" \
                "$asset" \
                "${asset}.sig"
            else
              node .github/scripts/upload-release-asset.mjs \
                "$api" \
                "$RELEASE_TAG" \
                "$version" \
                "$RELEASE_TARGET" \
                "$asset"
            fi
          done

  publish-update-service:
    name: Publish update service metadata
    runs-on: ubuntu-22.04
    needs: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Publish release to update service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\"}" \
            "$api/releases/$RELEASE_TAG/publish"
