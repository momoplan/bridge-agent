name: release-bridge-agent

on:
  push:
    tags:
      - "bridge-agent-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example bridge-agent-v0.1.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal
            runner: macos-15-intel
            tauri_args: --target universal-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            tauri_args: --bundles msi
            rust_targets: ""
          - name: Linux x64
            runner: ubuntu-22.04
            tauri_args: --bundles appimage,deb
            rust_targets: ""
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled Baijimu CLI
        shell: bash
        env:
          BAIJIMU_CLI_RS_GIT_URL: https://gitee.com/zxflimit_admin/baijimu-cli-rs.git
          BAIJIMU_CLI_RS_GIT_TOKEN: ${{ secrets.BAIJIMU_CLI_RS_GIT_TOKEN }}
        run: |
          set -euo pipefail
          ./tools/baijimu-cli/prepare-bundled-cli.sh

      - name: Configure Windows signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "SSL_COM_USERNAME",
            "SSL_COM_PASSWORD",
            "SSL_COM_CREDENTIAL_ID",
            "SSL_COM_TOTP_SECRET"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Windows release requires code signing. Missing SSL.com secrets: $($missing -join ', ')"
          }
          "WINDOWS_SIGNING_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare Windows signing tools
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "CodeSignTool"

          Invoke-WebRequest `
            -Uri "https://www.ssl.com/download/codesigntool-for-windows/" `
            -OutFile $zipPath
          Expand-Archive -Force -Path $zipPath -DestinationPath $extractPath

          $codeSignTool = Get-ChildItem `
            -Path $extractPath `
            -Filter "CodeSignTool.bat" `
            -Recurse `
            -File |
            Select-Object -First 1

          if (-not $codeSignTool) {
            throw "Unable to locate CodeSignTool.bat"
          }
          "CODESIGN_TOOL_PATH=$($codeSignTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Push-Location $codeSignTool.DirectoryName
          try {
            & ".\CodeSignTool.bat" --version
          } finally {
            Pop-Location
          }

      - name: Prepare Apple notarization credentials
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" >> "$GITHUB_ENV"

      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Validate release service config
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_UPDATE_API_URL BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done
          case "$BRIDGE_AGENT_UPDATE_API_URL" in
            *://relay.baijimu.com/*)
              echo "BRIDGE_AGENT_UPDATE_API_URL must use updates.baijimu.com for new releases; relay.baijimu.com is legacy compatibility only." >&2
              exit 1
              ;;
          esac
          case "$BRIDGE_AGENT_RELEASE_API_URL" in
            *://relay.baijimu.com/*)
              echo "BRIDGE_AGENT_RELEASE_API_URL must use updates.baijimu.com for new releases; relay.baijimu.com is legacy compatibility only." >&2
              exit 1
              ;;
          esac

      - name: Build release bundles
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_PAGE_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_PAGE_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Xiaofeng Zhang (H82D8SYZ94)"
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          WINDOWS_SIGNING_ENABLED: ${{ env.WINDOWS_SIGNING_ENABLED }}
          WINDOWS_SIGNING_DESCRIPTION: "百积木"
        run: |
          set -euo pipefail
          npm run tauri -- build ${{ matrix.tauri_args }}

      - name: Verify Windows signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diagnosticFiles = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          foreach ($file in $diagnosticFiles) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status) (intermediate exe)"
          }

          $files = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction Stop

          if ($files.Count -eq 0) {
            throw "No Windows MSI artifacts found to verify"
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($file.FullName): $($signature.Status)"
            }
          }

      - name: Upload bundles to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          release_notes="$(mktemp)"
          cat > "$release_notes" <<'NOTES'
          百积木桌面端发布。

          Download the installer for your platform from the Assets section below:
          - macOS: universal `.dmg` (works on both Intel and Apple Silicon)
          - Windows: `.msi` installer that downloads WebView2 only when it is missing
          - Linux: `.AppImage` / `.deb` / archive

          This release is built automatically by GitHub Actions from the tagged source.
          NOTES

          prerelease_flag=()
          case "$RELEASE_TAG" in
            *-alpha*|*-beta*|*-rc*) prerelease_flag=(--prerelease) ;;
          esac

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "百积木 $RELEASE_TAG" \
              --notes-file "$release_notes" \
              "${prerelease_flag[@]}" \
              || gh release view "$RELEASE_TAG" >/dev/null
          fi

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
              ;;
            "Windows x64")
              bundle_files=(src-tauri/target/release/bundle/msi/*.msi)
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          if [ "${#bundle_files[@]}" -eq 0 ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${bundle_files[@]}" --clobber

      - name: Upload release bundles to domestic release service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"
          asset_dir="$RUNNER_TEMP/bridge-agent-release-assets"
          mkdir -p "$asset_dir"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\",\"releaseName\":\"百积木 $RELEASE_TAG\",\"source\":\"github-actions\"}" \
            "$api/releases/$RELEASE_TAG"

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
              ;;
            "Windows x64")
              bundle_files=(src-tauri/target/release/bundle/msi/*.msi)
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          for file in "${bundle_files[@]}"; do
            cp "$file" "$asset_dir/"
          done

          asset_count="$(find "$asset_dir" -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" = "0" ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          find "$asset_dir" -type f -print0 | while IFS= read -r -d '' asset; do
            node .github/scripts/upload-release-asset.mjs \
              "$api" \
              "$RELEASE_TAG" \
              "$version" \
              "$RELEASE_TARGET" \
              "$asset"
          done

  publish-update-service:
    name: Publish update service metadata
    runs-on: ubuntu-22.04
    needs: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Publish release to update service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\"}" \
            "$api/releases/$RELEASE_TAG/publish"
