name: release-bridge-agent

on:
  push:
    tags:
      - "bridge-agent-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example bridge-agent-v0.1.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal
            runner: macos-15-intel
            tauri_args: --target universal-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: Windows x64
            runner: windows-latest
            tauri_args: --bundles msi
            rust_targets: ""
          - name: Linux x64
            runner: ubuntu-22.04
            tauri_args: --bundles appimage,deb
            rust_targets: ""
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Windows signing config
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET",
            "AZURE_TENANT_ID",
            "AZURE_ARTIFACT_SIGNING_ENDPOINT",
            "AZURE_ARTIFACT_SIGNING_ACCOUNT",
            "AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required Windows signing secrets: $($missing -join ', ')"
          }

      - name: Prepare Windows signing tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo install artifact-signing-cli --version 0.11.0 --locked
          artifact-signing-cli --version

          $azureCli = (Get-Command az.cmd -ErrorAction Stop).Source
          "AZURE_CLI_PATH=$azureCli" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $signTool = Get-ChildItem `
            -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" `
            -ErrorAction Stop |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signTool) {
            throw "Unable to locate x64 signtool.exe"
          }
          "SIGNTOOL_PATH=$($signTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare Apple notarization credentials
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" >> "$GITHUB_ENV"

      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Validate release service config
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_UPDATE_API_URL BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Build release bundles
        shell: bash
        env:
          BRIDGE_AGENT_UPDATE_API_URL: ${{ secrets.BRIDGE_AGENT_UPDATE_API_URL }}
          BRIDGE_AGENT_RELEASE_PAGE_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_PAGE_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Xiaofeng Zhang (H82D8SYZ94)"
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          WINDOWS_SIGNING_DESCRIPTION: "Bridge Agent"
        run: |
          set -euo pipefail
          npm run tauri -- build ${{ matrix.tauri_args }}

      - name: Verify Windows signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = @()
          $files += Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File -ErrorAction Stop
          $files += Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction Stop

          if ($files.Count -eq 0) {
            throw "No Windows artifacts found to verify"
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($file.FullName): $($signature.Status)"
            }
          }

      - name: Upload bundles to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          release_notes="$(mktemp)"
          cat > "$release_notes" <<'NOTES'
          Bridge Agent desktop release.

          Download the installer for your platform from the Assets section below:
          - macOS: universal `.dmg` (works on both Intel and Apple Silicon)
          - Windows: `.msi` or installer executable
          - Linux: `.AppImage` / `.deb` / archive

          This release is built automatically by GitHub Actions from the tagged source.
          NOTES

          prerelease_flag=()
          case "$RELEASE_TAG" in
            *-alpha*|*-beta*|*-rc*) prerelease_flag=(--prerelease) ;;
          esac

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "Bridge Agent $RELEASE_TAG" \
              --notes-file "$release_notes" \
              "${prerelease_flag[@]}" \
              || gh release view "$RELEASE_TAG" >/dev/null
          fi

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
              ;;
            "Windows x64")
              bundle_files=(src-tauri/target/release/bundle/msi/*.msi)
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          if [ "${#bundle_files[@]}" -eq 0 ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${bundle_files[@]}" --clobber

      - name: Upload release bundles to domestic release service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
          RELEASE_TARGET: ${{ matrix.name }}
        run: |
          set -euo pipefail

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"
          asset_dir="$RUNNER_TEMP/bridge-agent-release-assets"
          mkdir -p "$asset_dir"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\",\"releaseName\":\"Bridge Agent $RELEASE_TAG\",\"source\":\"github-actions\"}" \
            "$api/releases/$RELEASE_TAG"

          shopt -s nullglob
          case "$RELEASE_TARGET" in
            "macOS Universal")
              bundle_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
              ;;
            "Windows x64")
              bundle_files=(src-tauri/target/release/bundle/msi/*.msi)
              ;;
            "Linux x64")
              bundle_files=(
                src-tauri/target/release/bundle/appimage/*.AppImage
                src-tauri/target/release/bundle/deb/*.deb
              )
              ;;
            *)
              echo "Unsupported release target: $RELEASE_TARGET" >&2
              exit 1
              ;;
          esac

          for file in "${bundle_files[@]}"; do
            cp "$file" "$asset_dir/"
          done

          asset_count="$(find "$asset_dir" -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" = "0" ]; then
            echo "No release bundles found for $RELEASE_TARGET" >&2
            exit 1
          fi

          find "$asset_dir" -type f -print0 | while IFS= read -r -d '' asset; do
            node .github/scripts/upload-release-asset.mjs \
              "$api" \
              "$RELEASE_TAG" \
              "$version" \
              "$RELEASE_TARGET" \
              "$asset"
          done

  publish-update-service:
    name: Publish update service metadata
    runs-on: ubuntu-22.04
    needs: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            bridge-agent-v*) ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Publish release to update service
        shell: bash
        env:
          BRIDGE_AGENT_RELEASE_API_URL: ${{ secrets.BRIDGE_AGENT_RELEASE_API_URL }}
          BRIDGE_AGENT_RELEASE_API_TOKEN: ${{ secrets.BRIDGE_AGENT_RELEASE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in BRIDGE_AGENT_RELEASE_API_URL BRIDGE_AGENT_RELEASE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          api="${BRIDGE_AGENT_RELEASE_API_URL%/}"
          case "$api" in
            http://*) api="https://${api#http://}" ;;
          esac
          version="${RELEASE_TAG#bridge-agent-v}"

          curl -fsSL --post301 --post302 --post303 --retry 3 --retry-delay 2 \
            -X POST \
            -H "Authorization: Bearer $BRIDGE_AGENT_RELEASE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"tagName\":\"$RELEASE_TAG\",\"version\":\"$version\"}" \
            "$api/releases/$RELEASE_TAG/publish"
